name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main # Hoặc 'master' tùy nhánh của Lộc

jobs:
  # GIAI ĐOẠN 1: Đóng gói và đẩy lên Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./Front_end
          push: true
          tags: huynhtanloc2004/coffee-frontend:latest
          build-args: |
            VITE_API_URL=http://103.28.32.228:8080

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: huynhtanloc2004/coffee-backend:latest

  # GIAI ĐOẠN 2: Ra lệnh cho VPS kéo Image về chạy
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Đợi build xong mới deploy
    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 1. Vào đúng thư mục chứa docker-compose trên server
            cd /root/deploy

            # 2. Đăng nhập Docker Hub ngay trên Server (để pull được image)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 3. Kéo bản mới nhất về (nó sẽ bốc bản Lộc vừa push ở trên)
            docker compose pull

            # 4. Khởi động lại với cấu hình mới
            docker compose up -d
